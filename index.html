<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- Preload critical fonts FIRST to break CSS→font chain -->
    <link rel="preload" href="/fonts/Tropika.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/fonts/GlacialIndifference-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

    
    <!-- Critical skeleton CSS - must be in <head> to paint before JS -->
    <style>
      .sk-hero{min-height:85vh;background:#222020;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1rem 8rem;position:relative}
      .sk-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(34,32,32,.6),rgba(34,32,32,.4),#f8f8f8)}
      .sk-nav{position:fixed;top:0;left:0;right:0;z-index:50;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
      .sk-logo{width:140px;height:32px;background:rgba(255,255,255,.15);border-radius:6px}
      .sk-h1{font-family:'Tropika',sans-serif;color:#fff;font-size:clamp(1.5rem,5vw,3rem);text-align:center;position:relative;z-index:1}
      .sk-p{color:rgba(255,255,255,.8);font-family:'Glacial Indifference',sans-serif;text-align:center;position:relative;z-index:1;margin-top:.75rem;font-size:clamp(.875rem,2vw,1.125rem)}
      .sk-widget{position:absolute;bottom:0;left:50%;transform:translate(-50%,50%);width:calc(100% - 2rem);max-width:1200px;z-index:2;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border-radius:1rem;border:1px solid rgba(255,255,255,.2);padding:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1rem}
      @media(min-width:768px){.sk-widget{grid-template-columns:repeat(5,1fr)}}
      .sk-field{display:flex;flex-direction:column;gap:.5rem}
      .sk-label{font-size:.875rem;color:rgba(255,255,255,.7);font-family:'Glacial Indifference',sans-serif}
      .sk-input{height:3rem;background:#f8f8f8;border-radius:.375rem;border:1px solid #e5e7eb;padding:0 .75rem;font-size:.875rem;color:#9ca3af;font-family:'Glacial Indifference',sans-serif;display:flex;align-items:center}
      .sk-btn{height:3rem;background:#00D7FD;border-radius:.375rem;border:none;color:#fff;font-family:'Glacial Indifference',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;grid-column:span 2;display:flex;align-items:center;justify-content:center;gap:.5rem}
      @media(min-width:768px){.sk-btn{grid-column:span 1}}
    </style>
    
    <title>Studentresor – Studentresa till Kroatien 2026</title>
    <meta name="description" content="Boka din studentresa till Kroatien. Segelveckan, Splitveckan och Studentveckan – sol, segling och oförglömliga upplevelser. Resegaranti ingår." />

    <meta name="keywords" content="studentresor, studentresa, studentresa kroatien, segelveckan, splitveckan, studentveckan, studentresa 2026, studentresor kroatien" />
    <meta name="robots" content="noindex, nofollow" />
    <script>
      // Allow indexing ONLY on production domain
      if (window.location.hostname === 'www.studentresor.com' || window.location.hostname === 'studentresor.com') {
        document.querySelector('meta[name="robots"]').setAttribute('content', 'index, follow');
      }
    </script>

    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Studentresor – Studentresor till Kroatien" />
    <meta name="twitter:description" content="Boka din studentresa till Kroatien. Segelveckan, Splitveckan och Studentveckan." />
    <meta name="twitter:image" content="https://www.studentresor.com/images/studentresor-og.jpg" />

  </head>

  <body>
    <div id="root">
      <!-- Critical skeleton rendered by CSS in <head> -->
      <div class="sk-nav"><div class="sk-logo"></div></div>
      <div class="sk-hero">
        <h1 class="sk-h1">Drömmer ni om en <span style="color:#00D7FD">oförglömlig</span> studentresa?</h1>
        <p class="sk-p">Ert livs äventyr väntar runt hörnet, boka din resa redan idag.</p>
        <div class="sk-widget">
          <div class="sk-field">
            <span class="sk-label">Avreseort</span>
            <div class="sk-input">Alla avgångsorter</div>
          </div>
          <div class="sk-field">
            <span class="sk-label">Våra resor</span>

          </div>
          <div class="sk-field">

          </div>
          <div class="sk-field">
            <span class="sk-label">Antal resenärer</span>
            <div class="sk-input">2</div>
          </div>
          <div class="sk-field" style="justify-content:flex-end">
            <button class="sk-btn">Sök resor</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
